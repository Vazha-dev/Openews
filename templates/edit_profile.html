{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h3 class="mb-4 text-center" style="color: #22d3ee;">{{ t("edit_profile") }}</h3>

            <form method="POST" enctype="multipart/form-data">

                <div class="mb-3 text-center">
                    {% if current_user.avatar %}
                        <img src="{{ url_for('static', filename='uploads/' + current_user.avatar) }}"
                             style="width: 100px; height: 100px; border-radius: 50%;
                                    object-fit: cover; margin-bottom: 12px;">
                    {% else %}
                        <div style="width: 100px; height: 100px; border-radius: 50%;
                                    background-color: #4f46e5; display: flex; align-items: center;
                                    justify-content: center; font-size: 2.5rem; margin: 0 auto 12px;">
                            👤
                        </div>
                    {% endif %}
                    <div>
                        <label class="form-label">{{ t("profile_picture") }}</label>
                        <input type="file" name="avatar"
                               class="form-control bg-dark text-light border-secondary"
                               accept="image/*">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">{{ t("username") }}</label>
                    <input type="text" name="username"
                           value="{{ current_user.username }}"
                           class="form-control bg-dark text-light border-secondary" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">{{ t("email") }}</label>
                    <input type="email" name="email"
                           value="{{ current_user.email }}"
                           class="form-control bg-dark text-light border-secondary" required>
                </div>

                <hr style="border-color: #2d2d5e;">
                <p style="color: #a5b4fc; font-size: 0.9rem;">
                    {{ t("change_password") }}:
                </p>

                <div class="mb-3">
                    <label class="form-label">{{ t("current_password") }}</label>
                    <input type="password" name="current_password"
                           class="form-control bg-dark text-light border-secondary"
                           placeholder="{{ t('enter_current_password') }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">{{ t("new_password") }}</label>
                    <input type="password" name="password"
                           class="form-control bg-dark text-light border-secondary"
                           placeholder="{{ t('the_password_has_at_least_6_characters') }}">
                </div>

                <div class="mb-3">
                    <label class="form-label">{{ t("confirm_new_password") }}</label>
                    <input type="password" name="confirm_password"
                           class="form-control bg-dark text-light border-secondary"
                           placeholder="{{ t('confirm_new_password') }}">
                </div>

                <button type="submit" class="btn btn-primary w-100"> {{ t("save_changes") }} </button>
            </form>

            <a href="{{ url_for('profile') }}" class="btn btn-secondary w-100 mt-2">← {{ t("cancel") }}</a>
        </div>
    </div>
</div>
{% endblock %}
