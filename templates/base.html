<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenNews</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0d0d1a;
            color: #e0e0ff;
        }
        .navbar {
            background: linear-gradient(90deg, #1a1a3e, #2d1b69);
            border-bottom: 1px solid #4f46e5;
        }
        .navbar-brand {
            color: #22d3ee !important;
            font-weight: bold;
            font-size: 1.5rem;
        }
        .nav-link {
            color: #a5b4fc !important;
        }
        .nav-link:hover {
            color: #22d3ee !important;
        }
        .btn-primary {
            background-color: #4f46e5;
            border-color: #4f46e5;
        }
        .card {
            background-color: #1a1a2e;
            border: 1px solid #2d2d5e;
            color: #e0e0ff;
        }
        .navbar-toggler {
            border-color: #4f46e5;
        }
        .skeleton {
            background: linear-gradient(90deg, #1a1a2e 25%, #2d2d5e 50%, #1a1a2e 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
            border-radius: 4px;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-card {
            background-color: #1a1a2e;
            border: 1px solid #2d2d5e;
            border-radius: 8px;
            margin-bottom: 16px;
            overflow: hidden;
        }
        .card {
            background-color: #1a1a2e;
            border: 1px solid #2d2d5e;
            color: #e0e0ff;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.3);
            border-color: #4f46e5;
        }
    </style>
</head>
<body>

{% include 'navbar.html' %}

<div class="container">

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert {% if category == 'error' %}alert-danger{% else %}alert-success{% endif %} alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

</div>

{% include 'footer.html' %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
