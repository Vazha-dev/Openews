{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card p-4">
            <h3 class="mb-4 text-center" style="color: #22d3ee;">{{ t("login") }}</h3>

            <form method="POST">
                <div class="mb-3">
                    <label class="form-label">{{ t("username") }}</label>
                    <input type="text" name="username" class="form-control bg-dark text-light
    border-secondary" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">{{ t("password") }}</label>
                    <input type="password" name="password" class="form-control bg-dark text-light
    border-secondary" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">{{ t("login") }}</button>
            </form>
            
            <p class="text-center mt-3" style="color: #a5b4fc;">
                {{ t("no_account") }}?
                <a href="{{ url_for('register') }}" style="color: #22d3ee;">{{ t("register") }}</a>
            </p>
        </div>
    </div>
</div>

{% endblock %}
